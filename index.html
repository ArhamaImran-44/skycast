    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
     <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-primary-subtle d-flex justify-content-center align-items-center vh-100">

    <div class="row align-items-center">
    <div class="col-md-6 text-white">

        <h1 class="display-4 fw-bold">SkyCast</h1>

        <h4>Sky Above, Weather Ahead</h4>  

        <p class="mt-3 fs-5 qoute">
               🌍 Stay informed with accurate weather updates anytime, anywhere.
        </p>

    </div>

</div>
  <div class="card shadow p-4">

    <h2 class="text-center mb-3">🌤 SkyCast</h2>


    <p class="text-center text-secondary">
    Check Weather Instantly
</p>

    <div class="input-group">

        <input type="text" id="city" class="form-control"  placeholder="Enter City or country">

        <button class="btn btn-primary" id="btn">Search </button>

    </div>

    <div id="result" class="text-center mt-4"></div>

</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
